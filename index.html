<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Sama</title>
    <meta
      name="description"
      content="A GitHub Pages house evaluation pipeline for Redfin listings, tuned for commute, condition, neighborhood, and price fit."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="page-grain" aria-hidden="true"></div>

    <main class="page-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">House Sama</p>
          <h1>House Sama</h1>
          <p class="topbar__lede">
            Turn scattered Redfin links into a shortlist with actual conviction.
          </p>
        </div>

        <form class="capture-bar" id="capture-form">
          <label class="capture-field">
            <span class="eyebrow">Paste Redfin link</span>
            <input id="capture-input" type="url" placeholder="https://redf.in/JAR82i" autocomplete="off" />
          </label>
          <button class="button button-solid" type="submit">Prep refresh</button>
        </form>

        <div class="view-toggle" id="view-toggle" role="tablist" aria-label="Views">
          <button class="button button-ghost is-active" type="button" data-view-mode="board">Board</button>
          <button class="button button-ghost" type="button" data-view-mode="list">List</button>
          <button class="button button-ghost" type="button" data-view-mode="map">Map</button>
        </div>

        <p class="capture-feedback" id="capture-feedback"></p>
      </header>

      <section class="overview-strip">
        <div class="metric-ribbon" id="hero-metrics"></div>

        <div class="utility-bar">
          <div class="utility-bar__inputs">
            <label class="utility-field utility-field--search">
              <span class="eyebrow">Search</span>
              <input id="search-input" type="search" placeholder="Address, notes, tags, district, vibe" />
            </label>

            <label class="utility-field">
              <span class="eyebrow">Sort</span>
              <select id="sort-by">
                <option value="composite">Composite score</option>
                <option value="gut">Gut override</option>
                <option value="commute">Commute</option>
                <option value="price-low">Price low to high</option>
                <option value="price-high">Price high to low</option>
                <option value="freshness">Freshness</option>
              </select>
            </label>

            <label class="toggle toggle--compact">
              <input id="show-inactive" type="checkbox" checked />
              <span>Show pending / sold</span>
            </label>
          </div>

          <div class="utility-bar__views">
            <div class="saved-views" id="saved-views"></div>
            <button class="button button-ghost" id="save-view-button" type="button">Save lens</button>
          </div>
        </div>
      </section>

      <section class="board-head">
        <div>
          <p class="eyebrow">Pipeline board</p>
          <h2>Interested / Scheduled / Visited / Send to Dad</h2>
        </div>
        <p class="board-caption" id="board-caption"></p>
      </section>

      <nav class="stage-tabs" id="stage-tabs" aria-label="Pipeline stages"></nav>

      <section class="board-viewport" id="board-viewport">
        <div class="board-root" id="board-root"></div>
      </section>
    </main>

    <aside class="detail-shell" id="detail-shell" data-open="false" aria-live="polite">
      <div class="detail-panel">
        <button class="detail-close" id="detail-close-button" type="button" aria-label="Close packet">
          Close
        </button>
        <div id="detail-root"></div>
      </div>
    </aside>
    <div class="detail-backdrop" id="detail-backdrop" hidden></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
